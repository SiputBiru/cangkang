<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff" />
    <title>SiputBiru's Notes</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #111111;
            --link-color: #0056b3;
            --code-bg: #f4f4f4;
            --code-text: #24292e;
            --border-color: #eaeaea;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--bg-color);
            max-width: 680px; /* Crucial for readability */
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        h1, h2, h3 {
            line-height: 1.2;
            margin-top: 2rem;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        p {
            margin-bottom: 1.2rem;
        }

        a {
            color: var(--link-color);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        /* --- Code Block Styling --- */
        pre {
            background-color: var(--code-bg);
            padding: 1rem;
            overflow-x: auto;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            font-size: 0.9em;
        }

        code {
            font-family: "JetBrains Mono", Consolas, "Courier New", monospace;
            background-color: var(--code-bg);
            padding: 0.2em 0.4em;
            border-radius: 3px;
            font-size: 0.9em;
        }

        /* Prevent pre code blocks from having double padding/backgrounds */
        pre code {
            padding: 0;
            background-color: transparent;
            border-radius: 0;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="./index.html">Home</a>
        </nav>
    </header>

    <main>
        {{ content }}
    </main>

    <footer style="margin-top: 4rem; padding-top: 1rem; border-top: 1px solid var(--border-color); font-size: 0.8em; color: #666;">
        Built with <a href="https://github.com/SiputBiru/cangkang">Cangkang</a>.<br>
        © 2026-present siputbiru
    </footer>
</body>
</html>
